<svg width="1440" height="1580" viewBox="0 0 1440 1580" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="1580" fill="white"/>
  <style>
    .sans { font-family: Helvetica, Arial, sans-serif; fill: #000; }
    .muted { fill: #80807A; }
    .small { font-size: 13px; letter-spacing: -0.01em; }
    .label { font-size: 14px; font-weight: 600; letter-spacing: -0.02em; }
    .intro { font-size: 21px; letter-spacing: -0.02em; }
    .hero { font-size: 54px; letter-spacing: -0.055em; }
    .row-title { font-size: 28px; letter-spacing: -0.04em; }
    .body { font-size: 17px; letter-spacing: -0.01em; }
  </style>
  <line x1="0" y1="78" x2="1440" y2="78" stroke="black"/>
  <text class="sans label" x="38" y="44">Joseph York-Westcott</text>
  <text class="sans small" x="1120" y="44">Work        Studio        Contact</text>
  <text class="sans intro" x="38" y="135">
    <tspan x="38" dy="0">Visual communication designer working through identity,</tspan>
    <tspan x="38" dy="27">objects, campaigns, and printed systems.</tspan>
  </text>
  <text class="sans hero" x="704" y="160">
    <tspan x="704" dy="0">Images as evidence.</tspan>
    <tspan x="704" dy="57">Systems as atmosphere.</tspan>
    <tspan x="704" dy="57">Work as a sequence of decisions.</tspan>
  </text>
  <rect x="620" y="400" width="420" height="560" fill="#DADAD6" stroke="black"/>
  <rect x="720" y="460" width="420" height="560" fill="#ECECE8" stroke="black"/>
  <rect x="820" y="520" width="420" height="560" fill="#80807A" stroke="black"/>
  <text class="sans label" x="38" y="477">010 / Archive of Signals</text>
  <text class="sans body" x="38" y="522">
    <tspan x="38" dy="0">Visual identity, campaign system, publication direction.</tspan>
    <tspan x="38" dy="26">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</tspan>
    <tspan x="38" dy="26">Integer posuere sem at dictum cursus.</tspan>
  </text>
  <line x1="38" y1="680" x2="458" y2="680" stroke="black"/>
  <text class="sans small muted" x="38" y="718">
    <tspan x="38" dy="0">Hovering project titles trigger a stacked gallery system.</tspan>
    <tspan x="38" dy="22">The page remains still, then images accumulate like product evidence.</tspan>
  </text>
  <g>
    <line x1="0" y1="1160" x2="1440" y2="1160" stroke="black"/>
    <text class="sans small" x="38" y="1193">009</text>
    <text class="sans row-title" x="160" y="1192">Field Notes</text>
    <text class="sans small" x="620" y="1192">Editorial design, art direction, digital lookbook</text>
    <text class="sans small" x="1210" y="1192">2026 / Complete</text>
  </g>
  <g>
    <line x1="0" y1="1272" x2="1440" y2="1272" stroke="black"/>
    <text class="sans small" x="38" y="1305">008</text>
    <text class="sans row-title" x="160" y="1304">Common Room</text>
    <text class="sans small" x="620" y="1304">Brand language, spatial graphics, invitation suite</text>
    <text class="sans small" x="1210" y="1304">2025 / Complete</text>
  </g>
  <g>
    <line x1="0" y1="1384" x2="1440" y2="1384" stroke="black"/>
    <text class="sans small" x="38" y="1417">007</text>
    <text class="sans row-title" x="160" y="1416">Moving Still</text>
    <text class="sans small" x="620" y="1416">Campaign identity, motion principles, image treatment</text>
    <text class="sans small" x="1210" y="1416">2025 / Complete</text>
